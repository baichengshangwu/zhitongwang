name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    paths:
      - 'ios-project.tar.gz'
      - '.github/workflows/ios-build.yml'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract iOS project
        run: |
          tar -xzf ios-project.tar.gz
          ls -la AiNexus/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd AiNexus
          npm install

      - name: Prepare iOS platform
        run: |
          cd AiNexus
          npx cordova prepare ios

      - name: Build unsigned IPA
        run: |
          cd AiNexus
          mkdir -p output
          xcodebuild archive \
            -workspace "platforms/ios/App.xcworkspace" \
            -scheme "App" \
            -configuration Release \
            -archivePath "output/AI_Nexus.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          
          mkdir -p output/Payload
          cp -R "output/AI_Nexus.xcarchive/Products/Applications/AI Nexus.app" output/Payload/
          cd output
          zip -r AI_Nexus.ipa Payload/
          ls -lh AI_Nexus.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI_Nexus_iOS
          path: AiNexus/output/AI_Nexus.ipa
          retention-days: 30
