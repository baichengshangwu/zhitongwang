name: Build iOS App

on:

  workflow_dispatch:

jobs:

  build:

    runs-on: macos-latest

    steps:

      - uses: actions/checkout@v4

      - name: Build Unsigned IPA

        run: |

          cd ios-app

          xcodebuild build \

            -project zhitongwang.xcodeproj \

            -scheme zhitongwang \

            -configuration Release \

            -sdk iphoneos \

            -allowProvisioningUpdates \

            -derivedDataPath build \

            CODE_SIGN_IDENTITY="" \

            CODE_SIGNING_REQUIRED=NO \

            CODE_SIGNING_ALLOWED=NO \

            DEVELOPMENT_TEAM="" \

            PROVISIONING_PROFILE_SPECIFIER=""

          mkdir -p Payload

          cp -r build/Build/Products/Release-iphoneos/zhitongwang.app Payload/

          zip -r zhitongwang.ipa Payload

      - name: Upload IPA

        uses: actions/upload-artifact@v4

        with:

          name: zhitongwang-ios

          path: ios-app/zhitongwang.ipa
