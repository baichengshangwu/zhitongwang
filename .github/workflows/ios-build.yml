name: Build iOS App

on:

  workflow_dispatch:

jobs:

  build:

    runs-on: macos-latest

    steps:

      - uses: actions/checkout@v4

      - name: Build Unsigned IPA

        run: |

          cd ios-app

          xcodebuild archive \

            -project zhitongwang.xcodeproj \

            -scheme zhitongwang \

            -archivePath build/zhitongwang.xcarchive \

            -destination 'generic/platform=iOS' \

            CODE_SIGN_IDENTITY="" \

            CODE_SIGNING_REQUIRED=NO \

            CODE_SIGNING_ALLOWED=NO \

            DEVELOPMENT_TEAM="" \

            PROVISIONING_PROFILE_SPECIFIER=""

          xcodebuild -exportArchive \

            -archivePath build/zhitongwang.xcarchive \

            -exportPath build \

            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA

        uses: actions/upload-artifact@v4

        with:

          name: zhitongwang-ios

          path: ios-app/build/zhitongwang.ipa
