<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Nexus 后台管理</title>
<style>
:root{--bg:#0f172a;--bg2:#1e293b;--border:#334155;--t1:#f8fafc;--t2:#94a3b8;--t3:#64748b;--ap:#6366f1;--ag:#10b981;--ar:#ef4444;--blue:#3b82f6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
.login-box{max-width:400px;margin:80px auto;padding:32px;background:var(--bg2);border-radius:12px;border:1px solid var(--border)}
.login-box h1{font-size:1.5rem;margin-bottom:24px;text-align:center;color:var(--ap)}
input,select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--t1);font-size:.85rem;margin-bottom:12px}
button{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:.85rem}
.btn-p{background:var(--ap);color:#fff}
.btn-g{background:var(--ag);color:#fff}
.btn-r{background:var(--ar);color:#fff}
.btn-b{background:var(--blue);color:#fff}
.btn-s{background:var(--bg2);color:var(--t1);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--t2);font-weight:600;font-size:.75rem;text-transform:uppercase}
tr:hover{background:rgba(99,102,241,.05)}
.app{display:none;max-width:1200px;margin:0 auto;padding:20px}
.app.show{display:block}
header{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:24px}
header h1{font-size:1.2rem;color:var(--ap)}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.8rem;background:var(--bg2);border:1px solid var(--border);color:var(--t2)}
.tab.active{background:var(--ap);color:#fff;border-color:var(--ap)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.stat{padding:16px;background:var(--bg2);border-radius:10px;border:1px solid var(--border)}
.stat .label{font-size:.7rem;color:var(--t3);margin-bottom:4px}
.stat .value{font-size:1.4rem;font-weight:700;color:var(--t1)}
.badge{padding:2px 8px;border-radius:12px;font-size:.65rem;font-weight:600;display:inline-block}
.badge-admin{background:var(--ap);color:#fff}
.badge-user{background:var(--bg2);color:var(--t2);border:1px solid var(--border)}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-c{background:var(--bg2);border-radius:12px;padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto;border:1px solid var(--border)}
.modal-c h3{margin-bottom:16px;color:var(--ap)}
.search-bar{display:flex;gap:8px;margin-bottom:16px}
.search-bar input{flex:1;margin-bottom:0}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;font-size:.8rem;font-weight:600;z-index:200;animation:slidein .3s}
.toast-ok{background:var(--ag);color:#fff}
.toast-err{background:var(--ar);color:#fff}
@keyframes slidein{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.config-row{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg);border-radius:8px;margin-bottom:8px}
.config-row .key{font-weight:600;color:var(--ap);min-width:150px;font-size:.8rem}
.config-row .val{flex:1;color:var(--t2);font-size:.75rem;word-break:break-all}
.loading{text-align:center;color:var(--t3);padding:40px;font-size:.85rem}
</style>
</head>
<body>
<div class="login-box" id="login-box">
  <h1>AI Nexus 后台管理</h1>
  <input type="email" id="login-email" placeholder="管理员邮箱">
  <input type="password" id="login-pass" placeholder="密码" onkeydown="if(event.key==='Enter')doAdminLogin()">
  <button class="btn-p" onclick="doAdminLogin()" style="width:100%">登录</button>
  <div id="login-err" style="color:var(--ar);font-size:.75rem;margin-top:8px;display:none"></div>
</div>

<div class="app" id="app">
  <header>
    <h1>AI Nexus 后台管理</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <span style="font-size:.75rem;color:var(--t2)" id="admin-email"></span>
      <button class="btn-s" onclick="doLogout()">退出</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('overview')">概览</div>
    <div class="tab" onclick="switchTab('users')">用户管理</div>
    <div class="tab" onclick="switchTab('config')">系统配置</div>
  </div>

  <div id="tab-overview">
    <div class="stats" id="stats-grid"></div>
    <h3 style="margin:16px 0 8px;font-size:.9rem;color:var(--t2)">最近用户</h3>
    <div id="recent-users"></div>
  </div>

  <div id="tab-users" style="display:none">
    <div class="search-bar">
      <input type="text" id="user-search" placeholder="搜索邮箱或用户名..." oninput="loadUsers()">
    </div>
    <div id="users-table"></div>
  </div>

  <div id="tab-config" style="display:none">
    <h3 style="margin-bottom:12px;font-size:.9rem;color:var(--t2)">系统配置</h3>
    <div id="config-list"></div>
    <div style="margin-top:16px;padding:16px;background:var(--bg2);border-radius:8px;border:1px solid var(--border)">
      <h4 style="margin-bottom:8px;font-size:.85rem">添加/更新配置</h4>
      <input type="text" id="cfg-key" placeholder="配置键名" style="margin-bottom:8px">
      <input type="text" id="cfg-val" placeholder="配置值" style="margin-bottom:8px">
      <button class="btn-p" onclick="saveConfig()">保存配置</button>
    </div>
  </div>
</div>

<script>
var API_BASE = window.location.protocol + '//' + window.location.host;
var token = localStorage.getItem('nexus_admin_token');

async function api(path, opts){
  opts = opts || {};
  var headers = {'Content-Type':'application/json'};
  if(token) headers['Authorization'] = 'Bearer ' + token;
  if(opts.headers) Object.assign(headers, opts.headers);
  var r = await fetch(API_BASE + path, {...opts, headers});
  if(r.status === 401){ token=null; localStorage.removeItem('nexus_admin_token'); showLogin(); throw new Error('Session expired'); }
  if(!r.ok){ var e = await r.json().catch(()=>({error:'Unknown error'})); throw new Error(e.error||'HTTP '+r.status); }
  return r.json();
}

async function doAdminLogin(){
  var e = document.getElementById('login-email').value.trim().toLowerCase();
  var p = document.getElementById('login-pass').value;
  var errEl = document.getElementById('login-err');
  errEl.style.display = 'none';
  try{
    var r = await api('/api/login', {method:'POST', body:JSON.stringify({email:e, password:p})});
    if(!r.token) throw new Error('Invalid response');
    token = r.token;
    localStorage.setItem('nexus_admin_token', token);
    // Check admin
    var u = await api('/api/user');
    if(u.user.role !== 'admin'){ token=null; localStorage.removeItem('nexus_admin_token'); throw new Error('非管理员账号'); }
    document.getElementById('login-box').style.display = 'none';
    document.getElementById('app').classList.add('show');
    document.getElementById('admin-email').textContent = e;
    loadAll();
  }catch(err){
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  }
}

function showLogin(){
  document.getElementById('login-box').style.display = 'block';
  document.getElementById('app').classList.remove('show');
}

function doLogout(){
  token = null;
  localStorage.removeItem('nexus_admin_token');
  showLogin();
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  document.querySelector('.tab[onclick*="'+tab+'"]').classList.add('active');
  document.getElementById('tab-overview').style.display = tab==='overview'?'block':'none';
  document.getElementById('tab-users').style.display = tab==='users'?'block':'none';
  document.getElementById('tab-config').style.display = tab==='config'?'block':'none';
  if(tab==='overview') loadOverview();
  if(tab==='users') loadUsers();
  if(tab==='config') loadConfig();
}

// ===== Overview =====
async function loadOverview(){
  try{
    var s = await api('/api/admin/stats');
    document.getElementById('stats-grid').innerHTML = [
      {label:'总用户数',value:s.total_users||0},
      {label:'总调用次数',value:s.total_calls||0},
      {label:'总消费 AC',value:(s.total_cost||0).toFixed(0)},
      {label:'用户总余额',value:(s.total_balance||0).toFixed(0)},
      {label:'总充值',value:(s.total_recharge||0).toFixed(0)}
    ].map(function(s){return '<div class="stat"><div class="label">'+s.label+'</div><div class="value">'+s.value+'</div></div>'}).join('');
    var u = await api('/api/admin/users?limit=10');
    document.getElementById('recent-users').innerHTML = '<table><tr><th>ID</th><th>名称</th><th>邮箱</th><th>余额</th><th>等级</th><th>角色</th><th>注册时间</th></tr>'+
      u.users.map(function(u){return '<tr><td>'+u.id+'</td><td>'+esc(u.name)+'</td><td>'+esc(u.email)+'</td><td>'+(u.balance||0).toFixed(0)+'</td><td>'+esc(u.member_level||'normal')+'</td><td><span class="badge badge-'+(u.role==='admin'?'admin':'user')+'">'+esc(u.role||'user')+'</span></td><td>'+(u.joined||'')+'</td></tr>'}).join('')+'</table>';
  }catch(e){toast(e.message,'err')}
}

// ===== Users =====
var currentPage = 1;
async function loadUsers(page){
  page = page || currentPage;
  currentPage = page;
  var search = document.getElementById('user-search').value.trim();
  try{
    var r = await api('/api/admin/users?page='+page+'&limit=50&search='+encodeURIComponent(search));
    document.getElementById('users-table').innerHTML = 
      '<table><tr><th>ID</th><th>名称</th><th>邮箱</th><th>余额(AC)</th><th>NEXUS</th><th>累计充值</th><th>等级</th><th>KYC</th><th>角色</th><th>操作</th></tr>'+
      r.users.map(function(u){return '<tr><td>'+u.id+'</td><td>'+esc(u.name)+'</td><td>'+esc(u.email)+'</td><td>'+(u.balance||0).toFixed(0)+'</td><td>'+(u.nexus_balance||0).toFixed(0)+'</td><td>'+(u.total_recharge||0).toFixed(0)+'</td><td>'+esc(u.member_level||'normal')+'</td><td>'+esc(u.kyc||'Bronze')+'</td><td><span class="badge badge-'+(u.role==='admin'?'admin':'user')+'">'+esc(u.role||'user')+'</span></td><td><button class="btn-s" style="padding:4px 8px;font-size:.65rem" onclick="showUserDetail('+u.id+')">详情</button></td></tr>'}).join('')+
      '</table>'+
      '<div style="margin-top:12px;display:flex;gap:8px;justify-content:center">'+
        '<button class="btn-s" '+(page<=1?'disabled':'')+' onclick="loadUsers('+(page-1)+')">上一页</button>'+
        '<span style="font-size:.75rem;color:var(--t2);padding:8px">第 '+page+' 页 / 共 '+Math.ceil(r.total/50)+' 页 ('+r.total+' 用户)</span>'+
        '<button class="btn-s" '+(page>=Math.ceil(r.total/50)?'disabled':'')+' onclick="loadUsers('+(page+1)+')">下一页</button>'+
      '</div>';
  }catch(e){document.getElementById('users-table').innerHTML='<div class="loading">加载失败: '+esc(e.message)+'</div>'}
}

async function showUserDetail(id){
  try{
    var r = await api('/api/admin/user/'+id);
    var u = r.user;
    var txs = r.transactions || [];
    var modal = document.createElement('div');
    modal.className = 'modal show';
    modal.innerHTML = '<div class="modal-c">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'+
        '<h3 style="margin:0">'+esc(u.name)+' ('+esc(u.email)+')</h3>'+
        '<button class="btn-s" onclick="this.closest(\'.modal\').remove()">&times; 关闭</button>'+
      '</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;font-size:.8rem">'+
        '<div><span style="color:var(--t3)">余额:</span> <strong>'+(u.balance||0).toFixed(0)+' AC</strong></div>'+
        '<div><span style="color:var(--t3)">NEXUS:</span> '+(u.nexus_balance||0).toFixed(0)+'</div>'+
        '<div><span style="color:var(--t3)">累计充值:</span> '+(u.total_recharge||0).toFixed(0)+'</div>'+
        '<div><span style="color:var(--t3)">等级:</span> '+esc(u.member_level||'normal')+'</div>'+
        '<div><span style="color:var(--t3)">KYC:</span> '+esc(u.kyc||'Bronze')+'</div>'+
        '<div><span style="color:var(--t3)">角色:</span> '+esc(u.role||'user')+'</div>'+
        '<div><span style="color:var(--t3)">注册:</span> '+esc(u.joined||'')+'</div>'+
        '<div><span style="color:var(--t3)">钱包:</span> '+esc(u.wallet||'--')+'</div>'+
      '</div>'+
      '<div style="display:flex;gap:8px;margin-bottom:12px">'+
        '<input type="number" id="adj-amt" placeholder="调整金额 (+/-)" style="flex:1;margin-bottom:0">'+
        '<input type="text" id="adj-reason" placeholder="原因" style="flex:1;margin-bottom:0">'+
        '<button class="btn-p" onclick="adjustBalance('+u.id+')">调整余额</button>'+
      '</div>'+
      '<h4 style="font-size:.8rem;color:var(--t2);margin-bottom:8px">最近交易记录</h4>'+
      '<table><tr><th>类型</th><th>金额</th><th>代币</th><th>描述</th><th>模型</th><th>时间</th></tr>'+
        txs.slice(0,50).map(function(tx){return '<tr><td>'+esc(tx.type)+'</td><td style="color:'+(tx.amount>=0?'var(--ag)':'var(--ar)')+'">'+(tx.amount>=0?'+':'')+(tx.amount||0).toFixed(1)+'</td><td>'+esc(tx.token||'')+'</td><td>'+esc(tx.description||'')+'</td><td>'+esc(tx.model_used||'')+'</td><td>'+(tx.created_at||'').replace('T',' ').slice(0,19)+'</td></tr>'}).join('')+
      '</table>'+
    '</div>';
    document.body.appendChild(modal);
    modal.onclick = function(e){if(e.target===modal)modal.remove()};
  }catch(e){toast(e.message,'err')}
}

async function adjustBalance(userId){
  var amt = parseFloat(document.getElementById('adj-amt').value);
  var reason = document.getElementById('adj-reason').value.trim();
  if(isNaN(amt)){toast('请输入有效金额','err');return;}
  try{
    var r = await api('/api/admin/user/'+userId+'/balance', {method:'POST', body:JSON.stringify({amount:amt, reason:reason||'管理员调整'})});
    toast('余额已更新: '+(r.balance||0).toFixed(0)+' AC','ok');
    setTimeout(function(){loadUsers();},500);
  }catch(e){toast(e.message,'err')}
}

// ===== Config =====
async function loadConfig(){
  try{
    var configs = await api('/api/admin/config');
    document.getElementById('config-list').innerHTML = configs.map(function(c){
      var isKey = c.key === 'tokenhub_api_key';
      return '<div class="config-row"><div class="key">'+esc(c.key)+'</div><div class="val">'+(isKey?'sk-****'+(c.value?c.value.slice(-4):'未配置'):esc(c.value||''))+'</div><div style="font-size:.65rem;color:var(--t3)">'+esc(c.updated_at||'')+'</div></div>';
    }).join('') || '<div class="loading">暂无配置</div>';
  }catch(e){document.getElementById('config-list').innerHTML='<div class="loading">加载失败</div>'}
}

async function saveConfig(){
  var key = document.getElementById('cfg-key').value.trim();
  var val = document.getElementById('cfg-val').value.trim();
  if(!key){toast('请输入配置键名','err');return;}
  try{
    await api('/api/admin/config', {method:'PUT', body:JSON.stringify({key:key, value:val})});
    toast('配置已保存','ok');
    loadConfig();
    document.getElementById('cfg-key').value = '';
    document.getElementById('cfg-val').value = '';
  }catch(e){toast(e.message,'err')}
}

function toast(msg, type){
  var t = document.createElement('div');
  t.className = 'toast toast-'+(type||'ok');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){t.remove()},3000);
}

function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function loadAll(){
  loadOverview();
  loadUsers();
  loadConfig();
}

// Auto-login
if(token){
  (async function(){
    try{
      var u = await api('/api/user');
      if(u.user && u.user.role === 'admin'){
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('app').classList.add('show');
        document.getElementById('admin-email').textContent = u.user.email;
        loadAll();
      }else{token=null;localStorage.removeItem('nexus_admin_token')}
    }catch(e){token=null;localStorage.removeItem('nexus_admin_token')}
  })();
}
</script>
</body>
</html>
